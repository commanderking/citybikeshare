repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff lint
        entry: poetry run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: Ruff format
        entry: poetry run ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: pytest
        name: Pytest
        entry: poetry run pytest tests/ -q
        language: system
        pass_filenames: false
        always_run: true

      - id: generate-supported-cities
        name: Generate supported cities table
        entry: poetry run python scripts/generate_cities_table.py
        language: system
        pass_filenames: false
        files: ^src/citybikeshare/config/cities/|^scripts/generate_cities_table\.py$

