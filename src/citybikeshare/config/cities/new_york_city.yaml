name: new_york_city
system_name: new_york_city_bikeshare
source_url: "https://citibikenyc.com/system-data"
aws_sync: true
s3_bucket: s3://tripdata
s3_sync_options:  --exclude 'JC-*'

file_matcher:
  - citibike-tripdata
  - citbike-tripdata
  
# Citibike ships 2013 (Jun-Dec) and 2018 twice: a full-month base file
# (`YYYYMM-citibike-tripdata.csv.gz`) AND the same trips split at 1,000,000 rows into
# `_1`/`_2` parts. Verified identical trip sets (differ only in coordinate precision), so
# reading both double-counts the month. We keep the single base file and exclude the parts.
# Entries are flat (no folder prefix) so they match the raw layout; matching is substring,
# and `_1`/`_2` never appear in a base filename.
excluded_filenames:
  - "201306-citibike-tripdata_1.csv"
  - "201307-citibike-tripdata_1.csv"
  - "201308-citibike-tripdata_1.csv"
  - "201308-citibike-tripdata_2.csv"
  - "201309-citibike-tripdata_1.csv"
  - "201309-citibike-tripdata_2.csv"
  - "201310-citibike-tripdata_1.csv"
  - "201310-citibike-tripdata_2.csv"
  - "201311-citibike-tripdata_1.csv"
  - "201312-citibike-tripdata_1.csv"
  - "201801-citibike-tripdata_1.csv"
  - "201802-citibike-tripdata_1.csv"
  - "201803-citibike-tripdata_1.csv"
  - "201804-citibike-tripdata_1.csv"
  - "201804-citibike-tripdata_2.csv"
  - "201805-citibike-tripdata_1.csv"
  - "201805-citibike-tripdata_2.csv"
  - "201806-citibike-tripdata_1.csv"
  - "201806-citibike-tripdata_2.csv"
  - "201807-citibike-tripdata_1.csv"
  - "201807-citibike-tripdata_2.csv"
  - "201808-citibike-tripdata_1.csv"
  - "201808-citibike-tripdata_2.csv"
  - "201809-citibike-tripdata_1.csv"
  - "201809-citibike-tripdata_2.csv"
  - "201810-citibike-tripdata_1.csv"
  - "201810-citibike-tripdata_2.csv"
  - "201811-citibike-tripdata_1.csv"
  - "201811-citibike-tripdata_2.csv"
  - "201812-citibike-tripdata_1.csv"
  - "201812-citibike-tripdata_2.csv"

renamed_columns:
  ride_id: id
  rideable_type: bike_type
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  start_station_id: start_station_id
  end_station_name: end_station_name
  end_station_id: end_station_id
  start_lat: start_station_latitude
  start_lng: start_station_longitude
  end_lat: end_station_latitude
  end_lng: end_station_longitude
  member_casual: membership_type

  starttime: start_time
  stoptime: end_time
  start station id: start_station_id
  start station name: start_station_name
  start station latitude: start_station_latitude
  start station longitude: start_station_longitude
  end station id: end_station_id
  end station name: end_station_name
  end station latitude: end_station_latitude
  end station longitude: end_station_longitude
  bikeid: bike_id
  usertype: membership_type
  birth year: birth_year
  Gender: gender
  postal code: postal_code

  Trip Duration: duration
  Start Time: start_time
  Stop Time: end_time
  Start Station ID: start_station_id
  Start Station Name: start_station_name
  Start Station Latitude: start_station_latitude
  Start Station Longitude: start_station_longitude
  End Station ID: end_station_id
  End Station Name: end_station_name
  End Station Latitude: end_station_latitude
  End Station Longitude: end_station_longitude
  Bike ID: bike_id
  User Type: membership_type
  Birth Year: birth_year
  gender: gender

final_columns: 
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - membership_type
  - gender
  - birth_year
  - bike_type
  - bike_model


date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%d %H:%M:%S%.f"   # 2018 raw files use fractional-second timestamps
  - "%m/%d/%Y %H:%M:%S"
  - "%m/%d/%Y %H:%M"
processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - normalize_bike_type
  - select_final_columns
  - cast_optional_columns

coordinates:
  strategy: inline
  bounding_box: [40.5, 41.0, -74.2, -73.65]   # lat_min, lat_max, lng_min, lng_max
  min_coverage: 0.95
  # Raw header names span three eras: snake_case (2020+), spaced-lowercase (2013), and
  # Title Case (2016-19). _resolve_column picks whichever exists per file.
  date_column: [started_at, starttime, "Start Time"]
  start:
    name: [start_station_name, "start station name", "Start Station Name"]
    id:   [start_station_id, "start station id", "Start Station ID"]
    lat:  [start_lat, "start station latitude", "Start Station Latitude"]
    lng:  [start_lng, "start station longitude", "Start Station Longitude"]
  end:
    name: [end_station_name, "end station name", "End Station Name"]
    id:   [end_station_id, "end station id", "End Station ID"]
    lat:  [end_lat, "end station latitude", "End Station Latitude"]
    lng:  [end_lng, "end station longitude", "End Station Longitude"]
