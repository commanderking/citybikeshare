name: trondheim
system_name: trondheim_bikeshare
source_url: "https://trondheimbysykkel.no/en/open-data/historical"
aws_sync: false
file_matcher:
  - "trips"
renamed_columns:
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  end_station_name: end_station_name

date_formats:
  - "%Y-%m-%d %H:%M:%S%.f%:z"
  - "%Y-%m-%d %H:%M:%S%:z"

processing_pipeline:
  - rename_columns
  - select_final_columns
  - convert_to_datetime

# Station-coordinate extraction. Same schema as oslo/bergen (Urban Sharing v1);
# coords are inline on every trip row. Raw header names below.
coordinates:
  strategy: inline
  bounding_box: [63.3, 63.5, 10.2, 10.6]   # lat_min, lat_max, lng_min, lng_max — Trondheim metro
  min_coverage: 0.95
  date_column: [started_at]
  start:
    name: [start_station_name]
    id:   [start_station_id]
    lat:  [start_station_latitude]
    lng:  [start_station_longitude]
  end:
    name: [end_station_name]
    id:   [end_station_id]
    lat:  [end_station_latitude]
    lng:  [end_station_longitude]
