name: taipei
system_name: taipei_bikeshare
source_url: "https://data.gov.tw/dataset/150635"

aws_sync: false
file_matcher:
  - ".csv"
renamed_columns:
  rent_time: start_time
  rent_station: start_station_name
  return_station: end_station_name
  return_time: end_time
  rent: duration
  infodate: info_date

date_formats:
  - "%Y-%m-%d %H:%M:%S"

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - duration

read_csv_options:
  encoding: utf8-lossy
  has_header: auto
  # Only rendered if no header detected
  new_columns: 
    - "rent_time"
    - "rent_station"
    - "return_time"
    - "return_station"
    - "rent"
    - "infodate"


extraction_pipeline:
  header: auto

processing_pipeline:
  - rename_columns
  - select_final_columns
  - convert_to_datetime
  - remove_invalid_rows
  - handle_odd_hour_duration

# Curated known-corrupt values to drop (whole rows removed), keyed by column.
# Any other value that doesn't parse hard-errors instead of being nulled.
invalid_values:
  duration:
    - "17520:06:"   # 2025-09: corrupt row, 17520h duration + bogus 2027 end_time
    - "87648:04:"   # 2025-12

