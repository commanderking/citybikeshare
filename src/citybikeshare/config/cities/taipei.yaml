name: taipei
system_name: taipei_bikeshare
source_url: "https://data.gov.tw/dataset/150635"

# DATA COVERAGE — asymmetric origin/destination scope (verified 2026-02 data + raw source):
# This feed records trips *originating* from a core of Taipei City (臺北市) stations, but
# captures those trips *ending* at any station across the metro, including New Taipei City
# (新北市). The two station columns are therefore NOT interchangeable:
#   - start_station_name ⊆ end_station_name  exactly (every start is also seen as an end).
#   - Latest month: ~1,724 distinct starts vs ~2,928 distinct ends; ~1,204 stations are
#     END-ONLY (never appear as a start). The gap opened ~mid-2020 and grows as the system
#     expands — it is in the SOURCE, not introduced by our ETL.
#   - The both-columns core is effectively all Taipei City (~0% New Taipei). New Taipei
#     stations appear almost exclusively as END stations (~186 end-only vs ~0 genuine
#     starts; the handful of "start" matches are Taipei City roads named 金山/中和/林口).
# Implication: station-level / geographic analysis keyed on start_station barely sees New
# Taipei; it surfaces only in end_station. Origin↔destination flows are asymmetric by
# construction — net-flow / round-trip balance is not computable for New Taipei stations.

aws_sync: false
file_matcher:
  - ".csv"
renamed_columns:
  rent_time: start_time
  rent_station: start_station_name
  return_station: end_station_name
  return_time: end_time
  rent: duration
  infodate: info_date

date_formats:
  - "%Y-%m-%d %H:%M:%S"

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - duration
  - bike_type
  - bike_model

read_csv_options:
  encoding: utf8-lossy

# The source dropped its header row mid-2023 (and added a 7th bike_type column to the headerless
# layout in 2024-11). Restoring the missing header is a well-formedness fix, so it's done in the
# clean stage (taipei_prepend_header) rather than transform — after cleaning, every file is a
# normal headed CSV. compress_cleaned keeps the cleaned copy ~raw-sized instead of ~5x larger.
clean_pipeline:
  - taipei_prepend_header
compress_cleaned: true

processing_pipeline:
  - rename_columns
  - normalize_bike_type
  - select_final_columns
  # bike_type is present only in 7-column files; cast to Utf8 so the all-null 6-column era
  # doesn't emit a Null-dtype column that drops the typed values when parquets are combined.
  - cast_optional_columns
  - convert_to_datetime
  - remove_invalid_rows
  - handle_odd_hour_duration

# Curated known-corrupt values to drop (whole rows removed), keyed by column.
# Any other value that doesn't parse hard-errors instead of being nulled.
invalid_values:
  duration:
    - "17520:06:"   # 2025-09: corrupt row, 17520h duration + bogus 2027 end_time
    - "87648:04:"   # 2025-12

