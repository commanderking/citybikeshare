name: guadalajara
system_name: guadalajara_bikeshare
source_url: "https://www.mibici.net/es/datos-abiertos/"
aws_sync: false

file_matcher:
  - "datos_abiertos"
renamed_columns:
  Viaje_Id: trip_id
  Usuario_Id: user_id
  A�o_de_nacimiento: birth_year
  Año_de_nacimiento: birth_year
  A}�e_nacimiento: birth_year
  Genero: gender
  Inicio_del_viaje: start_time
  Fin_del_viaje: end_time
  Origen_Id: start_station_id
  Destino_Id: end_station_id

final_columns:
  - user_id
  - birth_year
  - gender
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  
# Guadalajara has ids only (no names). We need to create the id to station map names before transform
pre_transform_pipeline:
  - refresh_guadalajara_station_map
# Station ids that appear in trip files but no obtainable nomenclatura ever names
# (the source only serves the current month's station file). 
unmapped_station_ids:
  [400, 402, 408, 409, 410, 411, 412, 413, 414, 415, 416, 417, 418, 419]

date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%d/%m/%Y %H:%M"
# Source wrote birth_year as a float string (1994.0) until mid-2021, plain int since.
# Below this, values (1, 199, 200) are junk and get nulled; 1900+ is kept as-is.
birth_year_min: 1900
read_csv_options:
  encoding: "utf8-lossy"
processing_pipeline:
  - rename_columns
  - handle_guadalajara_stations
  - select_final_columns
  - convert_to_datetime
  - normalize_birth_year

# Station coordinates come from the monthly `nomenclatura` roster (trips carry no inline
# coords), keyed by name — the same name the transform assigns via the committed station map,
# so it joins to the trip data. Newest month wins per id. n_obs is a placeholder (roster
# snapshot, no trip counts), so drop the canonicalize n_obs floor.
coordinates:
  strategy: station_file
  key: name
  bounding_box: [20.4, 20.9, -103.5, -103.2]   # lat_min, lat_max, lng_min, lng_max — Guadalajara
  min_coverage: 0.90
  canonicalize:
    n_obs_floor: 0
  station_file:
    format: csv
    dir: raw
    glob: "nomenclatura*.csv*"
    id:   ["id"]
    name: ["name"]
    lat:  ["latitude"]
    lng:  ["longitude"]


