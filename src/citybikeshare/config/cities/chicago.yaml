name: chicago
system_name: chicago_bikeshare
source_url: "https://divvybikes.com/system-data"
aws_sync: true
s3_bucket: s3://divvy-tripdata

file_matcher:
  - trip
  - Trips

renamed_columns:
  # Commonized system data columns (used by newer Divvy datasets)
  ride_id: id
  bikeid: bike_id
  rideable_type: bike_type
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  start_station_id: start_station_id

  # Starting in 2020, it seems Chicago e-bikes can be docked anywhere and don't have an end station name
  # They do have an end_lat and end_lng to show where they were docked though

  end_station_name: end_station_name
  end_station_id: end_station_id
  start_lat: start_station_latitude
  start_lng: start_station_longitude
  end_lat: end_station_latitude
  end_lng: end_station_longitude
  member_casual: member_casual

  # Pre-March 2023 (older Divvy files)
  starttime: start_time
  stoptime: end_time
  from_station_id: start_station_id
  from_station_name: start_station_name
  to_station_id: end_station_id
  to_station_name: end_station_name
  usertype: membership_type
  birth year: birth_year
  birthyear: birth_year
  gender: gender

  # Oddball format (2018_Q1–2019_Q2)
  "01 - Rental Details Local Start Time": start_time
  "01 - Rental Details Local End Time": end_time
  "03 - Rental Start Station ID": start_station_id
  "03 - Rental Start Station Name": start_station_name
  "02 - Rental End Station ID": end_station_id
  "02 - Rental End Station Name": end_station_name
  "User Type": membership_type
  "Member Gender": gender
  "05 - Member Details Member Birthday Year": birth_year

  "User Type": membership_type
  "member_casual": membership_type
  "Member Gender": gender


final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - membership_type
  - gender
  - birth_year
  - bike_type
  - bike_model


date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%d %H:%M:%S%.f"   # 2024+ files carry fractional seconds
  - "%m/%d/%Y %H:%M:%S"
  - "%m/%d/%Y %H:%M"
  - "%Y-%m-%d %H:%M"   # Divvy_Trips_2013 format

read_csv_options:
  encoding: utf8-lossy
  schema_overrides: 
    gender: String 



processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - normalize_bike_type
  - select_final_columns
  - cast_optional_columns

# Station-coordinate extraction. Coords are inline only in the 2020+ (start_lat/lng) era;
# the older Divvy_Trips files carry station names but no lat/lng, so Stage 1 skips them
# (they produce no frame and stay out of the coverage denominator). Raw header names below.
#
# NUANCE — coverage/counts are 2020+ only, not all-time:
#   * A station's point is the mean of its 2020+ endpoints only; pre-2020 trips carry no
#     coordinate and never enter the mean. `n_obs` here is a 2020+ endpoint count, NOT the
#     station's all-time trip count. `min_coverage` measures the coord-era, not all Chicago trips.
#   * Stations that operated both before and after 2020 ARE located (via their 2020+ data).
#     ~123 station names appear ONLY in the pre-2020 trip files and get NO coordinate here.
#   * Those older coords aren't lost: the `Divvy_Stations_*` files in raw/ hold name→lat/lng
#     for ~105 of the 123 (the rest are name-string variants / absent). The inline strategy
#     doesn't read them (file_matcher excludes non-"trip" files). Backfilling them needs the
#     station-file join (the deferred `station_file` coord strategy) — not this inline block.
coordinates:
  strategy: inline
  bounding_box: [41.6, 42.15, -88.0, -87.5]   # lat_min, lat_max, lng_min, lng_max — Chicagoland
  min_coverage: 0.95
  date_column: [started_at]
  start:
    name: [start_station_name]
    id:   [start_station_id]
    lat:  [start_lat]
    lng:  [start_lng]
  end:
    name: [end_station_name]
    id:   [end_station_id]
    lat:  [end_lat]
    lng:  [end_lng]
