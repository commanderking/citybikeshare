name: columbus
system_name: columbus_bikeshare
file_matcher: cogo-tripdata
source_url: "https://cogobikeshare.com/system-data"
aws_sync: true
s3_bucket: "s3://cogo-sys-data"

renamed_columns:
  # Commonized system data columns
  ride_id: id
  rideable_type: bike_type
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  start_station_id: start_station_id
  end_station_name: end_station_name
  end_station_id: end_station_id
  start_lat: start_station_latitude
  start_lng: start_station_longitude
  end_lat: end_station_latitude
  end_lng: end_station_longitude
  member_casual: membership_type

  # Columbus format 1
  trip_id: id
  start_time: start_time
  end_time: end_time
  bikeid: bike_id
  tripduration: trip_duration
  from_station_location: start_station_location
  from_station_id: start_station_id
  from_station_name: start_station_name
  to_station_location: end_station_location
  to_station_id: end_station_id
  to_station_name: end_station_name
  usertype: membership_type
  gender: gender
  birthyear: birth_year

  # Columbus format 2
  "Start Time and Date": start_time
  "Stop Time and Date": end_time
  "Start Station ID": start_station_id
  "Start Station Name": start_station_name
  "Start Station Lat": start_station_latitude
  "Start Station Long": start_station_longitude
  "Stop Station ID": end_station_id
  "Stop Station Name": end_station_name
  "Stop Station Lat": end_station_latitude
  "Stop Station Long": end_station_longitude
  "Bike ID": bike_id
  "User Type": membership_type
  Gender: gender

  "Year of Birth": birth_year

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - membership_type
  - gender
  - birth_year
  - bike_type
  - bike_model


date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%d %H:%M:%S%.f"   # 2024+ files carry fractional seconds
  - "%m/%d/%Y %H:%M:%S"

processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - normalize_bike_type
  - select_final_columns
  - cast_optional_columns

# Station-coordinate extraction. Two coord-bearing eras: the early "Start Station Lat/Long"
# schema and the modern start_lat/lng schema. The middle `from_station_location` era packs
# coords into a single combined string (no separate lat/lng cols), so Stage 1 skips it and it
# stays out of the coverage denominator. Raw header names below (lists span the two eras).
coordinates:
  strategy: inline
  bounding_box: [39.8, 40.2, -83.2, -82.8]   # lat_min, lat_max, lng_min, lng_max — Columbus OH
  min_coverage: 0.95
  date_column: [started_at, "Start Time and Date"]
  start:
    name: [start_station_name, "Start Station Name"]
    id:   [start_station_id, "Start Station ID"]
    lat:  [start_lat, "Start Station Lat"]
    lng:  [start_lng, "Start Station Long"]
  end:
    name: [end_station_name, "Stop Station Name"]
    id:   [end_station_id, "Stop Station ID"]
    lat:  [end_lat, "Stop Station Lat"]
    lng:  [end_lng, "Stop Station Long"]
