name: mexico_city
system_name: mexico_city_bikeshare
source_url: "https://ecobici.cdmx.gob.mx/en/open-data/"
aws_sync: false
file_matcher:
  - ".csv"
  - ".zip"
clean_pipeline: 
  - normalize_newlines
renamed_columns:
  # Standard mappings
  Genero_Usuario: gender
  Edad_Usuario: age
  Bici: bike_id
  Ciclo_Estacion_Retiro: start_station_id
  Fecha_Retiro: start_date
  Hora_Retiro: starting_time
  Ciclo_Estacion_Arribo: end_station_id
  Fecha_Arribo: end_date
  Hora_Arribo: ending_time

  # Misaligned / lowercase variant (2022-09.csv)
  Genero_usuario: gender
  Edad_usuario: age
  CE_retiro: start_station_id
  Fecha_retiro: start_date
  Hora_retiro: starting_time
  CE_arribo: end_station_id
  Fecha_arribo: end_date
  Hora_arribo: ending_time

  # Typos and irregular header corrections
  Ciclo_EstacionArribo: end_station_id
  Fecha Arribo: end_date
  Hora Arribo: ending_time
  Hora_Retiro_duplicated_0: ending_time

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - bike_id
  - age
  - gender


date_formats:
  - "%m-%d-%Y"
  - "%d/%m/%Y"
  - "%Y-%m-%d"

read_csv_options:
  encoding: "utf8-lossy"
processing_pipeline:
  - rename_columns
  - remove_invalid_rows
  - join_mexico_city_station_names
  - clean_datetimes
  - combine_datetimes
  - offset_two_digit_years
  - select_final_columns

# Malformed station ids (leaked names, tag-reader errors, placeholder labels) that
# appear in the id columns. Dropped before the station join so the coverage assert
# only sees genuine ids; everything else numeric is a real station (see
# unmapped_station_ids). Listed per column since either endpoint can carry them.
invalid_values:
  start_station_id: &bad_station_ids
    - "NULL"
    - "Temporal 1"
    - "Temporal 2"
    - "Temporal 3"
    - "Temporal 4"
    - "Temporal - 2da Sección Bosque Chapultepec"
    - "CE-622"
    - "CE-642"
    - "Kiosco 150177"
    - "Kiosco Reciclar Fue CE-008"
    - "kiosco Buscar (tal vez CE-009)"
    - "kiosco100-FallaRTC"
    - "Tag ID defectuosa NS 1649 (Kiosco478)"
    - "tag 2"
    - "32:11.8"
  end_station_id: *bad_station_ids

# Real stations used by trips but absent from the GBFS station_information.json,
# which only lists *currently active* stations — early ids (2, 3, 4 …) that were
# decommissioned/renumbered in the Lyft era, and newer ones the committed snapshot
# predates. The source can't name them, so they flow through as "Unknown (id N)"
# rather than being dropped. Refreshing GBFS does not recover these (verified).
unmapped_station_ids:
  - 2
  - 3
  - 4
  - 13
  - 54
  - 248
  - 274
  - 308
  - 310
  - 351
  - 661
  - 675
  - 676
  - 677
  - 679
  - 680
  - 687
  - 688
  - 689
  - 690
  - 691
  - 692
  - 693
  - 696
  - 701
