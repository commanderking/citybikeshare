  - 3002
  - 3003
  - 4000
  - 4422222
  # Ambiguous station pairs (2022+ Lyft-era exports): a fixed set of 12 consecutive
  # id pairs where BOTH halves are real, distinct stations in different neighborhoods
  # (likely a duplicate/twin station record from the migration that the trip→station
  # join matches to both). The source doesn't say which, so they flow through as
  # "Unknown (id N-M)" rather than guessing a half. Quoted to stay strings, not math.
  - "107-108"
  - "158-159"
  - "192-193"
  - "235-236"
  - "237-238"
  - "264-275"
  - "266-267"
  - "268-269"
  - "271-272"
  - "273-274"
  - "390-391"
  - "445-446"

