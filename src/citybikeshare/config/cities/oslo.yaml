name: oslo
system_name: oslo_bikeshare
source_url: "https://oslobysykkel.no/en/open-data/historical"
aws_sync: false
file_matcher:
  - ".csv"
renamed_columns:
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  end_station_name: end_station_name
  Start station: start_station_id
  End station: end_station_id
  Start time: start_time
  End time: end_time

date_formats:
  - "%Y-%m-%d %H:%M:%S%.f%:z"
  - "%Y-%m-%d %H:%M:%S%:z"

read_csv_options:
  encoding: "utf8-lossy"
processing_pipeline:
  - rename_columns
  - handle_oslo_legacy_stations
  - select_final_columns
  - convert_to_datetime

coordinates:
  strategy: inline
  bounding_box: [59.8, 60.05, 10.5, 11.0]   # lat_min, lat_max, lng_min, lng_max
  min_coverage: 0.95
  # Raw header names; coords exist only in the 2019+ (v1) files — the 2016-18 era has
  # station names but no lat/lng and Stage 1 skips it.
  date_column: [started_at]
  start:
    name: [start_station_name]
    id:   [start_station_id]
    lat:  [start_station_latitude]
    lng:  [start_station_longitude]
  end:
    name: [end_station_name]
    id:   [end_station_id]
    lat:  [end_station_latitude]
    lng:  [end_station_longitude]

