name: san_francisco
system_name: san_francisco_bikeshare
source_url: "https://www.lyft.com/bikes/bay-wheels/system-data"
aws_sync: true
s3_bucket: s3://baywheels-data

file_matcher:
  - tripdata
renamed_columns:
  ride_id: id
  rideable_type: bike_type
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  start_station_id: start_station_id
  end_station_name: end_station_name
  end_station_id: end_station_id
  start_lat: start_station_latitude
  start_lng: start_station_longitude
  end_lat: end_station_latitude
  end_lng: end_station_longitude
  member_casual: membership_type

  start_time: start_time
  end_time: end_time
  start_station_id: start_station_id
  start_station_name: start_station_name
  start_station_latitude: start_station_latitude
  start_station_longitude: start_station_longitude
  end_station_id: end_station_id
  end_station_name: end_station_name
  end_station_latitude: end_station_latitude
  end_station_longitude: end_station_longitude
  bike_id: bike_id
  user_type: membership_type

final_columns:
 - start_time
 - end_time
 - start_station_name
 - end_station_name
 - bike_id 
 - membership_type
 - bike_type

date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%d %H:%M:%S%.f"   # Ford GoBike era carries fractional seconds
processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - select_final_columns
  - cast_optional_columns

# Station-coordinate extraction. Coords are inline across both eras (Ford GoBike
# start_station_latitude → Bay Wheels start_lat). Raw header names below (lists span eras).
coordinates:
  strategy: inline
  bounding_box: [37.2, 37.95, -122.55, -121.75]   # lat_min, lat_max, lng_min, lng_max — SF Bay Area (SF/Oakland/San Jose)
  min_coverage: 0.95
  date_column: [started_at, start_time]
  start:
    name: [start_station_name]
    id:   [start_station_id]
    lat:  [start_lat, start_station_latitude]
    lng:  [start_lng, start_station_longitude]
  end:
    name: [end_station_name]
    id:   [end_station_id]
    lat:  [end_lat, end_station_latitude]
    lng:  [end_lng, end_station_longitude]
