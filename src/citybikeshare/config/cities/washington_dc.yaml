name: washington_dc
system_name: washington_dc_bikeshare
source_url: "https://capitalbikeshare.com/system-data"
s3_bucket: s3://capitalbikeshare-data

aws_sync: true
file_matcher:
  - capitalbikeshare-tripdata
renamed_columns:
  ride_id: id
  rideable_type: bike_type
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  start_station_id: start_station_id
  end_station_name: end_station_name
  end_station_id: end_station_id
  start_lat: start_station_latitude
  start_lng: start_station_longitude
  end_lat: end_station_latitude
  end_lng: end_station_longitude
  member_casual: membership_type

  Duration: duration
  Start date: start_time
  End date: end_time
  Start station number: start_station_id
  Start station: start_station_name
  End station number: end_station_id
  End station: end_station_name
  Bike number: bike_id
  Member type: membership_type

final_columns: 
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - membership_type
  - bike_type

date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%d %H:%M:%S%.f"   # modern (2020+) Lyft files use millisecond timestamps
processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - select_final_columns
  - cast_optional_columns

coordinates:
  strategy: inline
  bounding_box: [38.7, 39.2, -77.45, -76.85]   # lat_min, lat_max, lng_min, lng_max (covers Reston/Herndon west edge)
  min_coverage: 0.95
  # Raw header names; coords only exist in the modern (2020+) Lyft-format files —
  # pre-2020 Capital Bikeshare files carry no lat/lng and Stage 1 skips them.
  date_column: [started_at]
  start:
    name: [start_station_name]
    id:   [start_station_id]
    lat:  [start_lat]
    lng:  [start_lng]
  end:
    name: [end_station_name]
    id:   [end_station_id]
    lat:  [end_lat]
    lng:  [end_lng]
