name: toronto
system_name: toronto_bikeshare
source_url: "https://open.toronto.ca/dataset/bike-share-toronto-ridership-data/"
aws_sync: false
file_matcher:
  - .csv
# The 2024 monthly files (bike_share_ridership_2024-01..09, Jan–Sep) duplicate the full-year
# annual bikeshare-ridership-2024 — same trips, so counts would inflate. Exclude the monthly
# ones (the annual is the complete year). The 2023 monthly files have no annual counterpart, so
# this substring is scoped to 2024- and leaves them untouched.
excluded_filenames:
  - "bike_share_ridership_2024-"
renamed_columns:
  trip_id: trip_id
  trip_start_time: start_time
  trip_stop_time: end_time
  trip_duration_seconds: duration
  from_station_name: start_station_name
  to_station_name: end_station_name
  user_type: membership_type

  Trip Id: trip_id
  Trip  Duration: duration
  Start Station Id: start_station_id
  Start Time: start_time
  Start Station Name: start_station_name
  End Station Id: end_station_id
  End Time: end_time
  End Station Name: end_station_name
  Bike Id: bike_id
  User Type: membership_type

  # Late-2025 format switched to underscore Title-Case headers
  Trip_Id: trip_id
  Trip_Duration: duration
  Start_Station_Id: start_station_id
  Start_Time: start_time
  Start_Station_Name: start_station_name
  End_Station_Id: end_station_id
  End_Time: end_time
  End_Station_Name: end_station_name
  Bike_Id: bike_id
  User_Type: membership_type
  # Bike-model column: "Model" in the 2024 monthly files, "Bike_Model" from 2025 on. Both feed
  # the two-layer bike_type/bike_model via normalize_bike_type — ICONIC=classic, EFIT/EFIT G5/
  # ASTRO=electric. (The duplicate 2024 monthly files are dropped via excluded_filenames above.)
  Model: bike_type
  Bike_Model: bike_type

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - membership_type
  - bike_id
  - bike_type
  - bike_model

date_formats:
  - "%m/%d/%Y %H:%M"
  - "%m/%d/%Y %H:%M:%S"
  - "%d/%m/%Y %H:%M"
  - "%Y-%m-%d %H:%M:%S"
read_csv_options:
  encoding: utf8-lossy
  null_values:
    - "NULLNULL"   # one corrupt end_time in bikeshare_ridership_(2017_q4) → treat as missing
# TODO(data-quality): 2020-10.csv.gz has 249 rows (of 277,839) that omit the `Start Station Id`
# field entirely — they carry 9 comma-fields instead of 10, so every column after Trip Duration
# shifts one left (station names land in start_time). convert_to_datetime fails loud on them, which
# currently blocks a full `--no-incremental` rebuild of Toronto. The rows are otherwise valid trips
# (only the unused Start Station Id is missing); fix is to recover them by padding 9-field rows with
# an empty Start Station Id before the scan, or drop them. See the TODO section in README.md.
processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - normalize_bike_type
  - select_final_columns
  - offset_two_digit_years
  - cast_optional_columns
