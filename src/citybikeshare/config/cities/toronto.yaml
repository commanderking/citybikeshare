name: toronto
system_name: toronto_bikeshare
source_url: "https://open.toronto.ca/dataset/bike-share-toronto-ridership-data/"
aws_sync: false
file_matcher:
  - .csv
renamed_columns:
  trip_id: trip_id
  trip_start_time: start_time
  trip_stop_time: end_time
  trip_duration_seconds: duration
  from_station_name: start_station_name
  to_station_name: end_station_name
  user_type: membership_type

  Trip Id: trip_id
  Trip  Duration: duration
  Start Station Id: start_station_id
  Start Time: start_time
  Start Station Name: start_station_name
  End Station Id: end_station_id
  End Time: end_time
  End Station Name: end_station_name
  Bike Id: bike_id
  User Type: membership_type

  # Late-2025 format switched to underscore Title-Case headers
  Trip_Id: trip_id
  Trip_Duration: duration
  Start_Station_Id: start_station_id
  Start_Time: start_time
  Start_Station_Name: start_station_name
  End_Station_Id: end_station_id
  End_Time: end_time
  End_Station_Name: end_station_name
  Bike_Id: bike_id
  User_Type: membership_type
  Bike_Model: bike_type

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - membership_type
  - bike_id

date_formats:
  - "%m/%d/%Y %H:%M"
  - "%m/%d/%Y %H:%M:%S"
  - "%d/%m/%Y %H:%M"
  - "%Y-%m-%d %H:%M:%S"
read_csv_options:
  encoding: utf8-lossy
processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - select_final_columns
  - offset_two_digit_years
  - cast_optional_columns
