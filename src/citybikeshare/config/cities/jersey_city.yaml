name: jersey_city
system_name: jersey_city_bikeshare
source_url: "https://citibikenyc.com/system-data"
aws_sync: true
# Should have s3_sync_options, but tacking on to script for now
s3_bucket: s3://tripdata
s3_sync_options: --exclude '*' --include 'JC-*'
file_matcher:
  - JC-
renamed_columns:
  ride_id: id
  rideable_type: bike_type
  started_at: start_time
  ended_at: end_time
  start_station_name: start_station_name
  start_station_id: start_station_id
  end_station_name: end_station_name
  end_station_id: end_station_id
  start_lat: start_station_latitude
  start_lng: start_station_longitude
  end_lat: end_station_latitude
  end_lng: end_station_longitude
  member_casual: membership_type

  starttime: start_time
  stoptime: end_time
  start station id: start_station_id
  start station name: start_station_name
  start station latitude: start_station_latitude
  start station longitude: start_station_longitude
  end station id: end_station_id
  end station name: end_station_name
  end station latitude: end_station_latitude
  end station longitude: end_station_longitude
  bikeid: bike_id
  usertype: membership_type
  birth year: birth_year
  Gender: gender
  postal code: postal_code

  Trip Duration: duration
  Start Time: start_time
  Stop Time: end_time
  Start Station ID: start_station_id
  Start Station Name: start_station_name
  Start Station Latitude: start_station_latitude
  Start Station Longitude: start_station_longitude
  End Station ID: end_station_id
  End Station Name: end_station_name
  End Station Latitude: end_station_latitude
  End Station Longitude: end_station_longitude
  Bike ID: bike_id
  User Type: membership_type
  Birth Year: birth_year
  gender: gender

final_columns: 
- start_time
- end_time
- start_station_name
- end_station_name
- membership_type
- gender
- birth_year
- bike_type
- bike_model

date_formats:
  - "%Y-%m-%d %H:%M:%S"
  - "%Y-%m-%d %H:%M:%S%.f"   # 2018 era carries fractional seconds
processing_pipeline:
  - rename_columns
  - convert_to_datetime
  - normalize_bike_type
  - select_final_columns
  - cast_optional_columns

# Station-coordinate extraction. Coords are inline across all three schema eras (Citi Bike
# JC): "Start Station Latitude" → "start station latitude" → start_lat. Raw header names
# below (lists span the eras).
coordinates:
  strategy: inline
  bounding_box: [40.65, 40.80, -74.12, -73.95]   # lat_min, lat_max, lng_min, lng_max — Jersey City / Hoboken
  # Rejects (0,0) "Don't Use" test docks and stray upper-Manhattan NYC stations that appear
  # in cross-river trips — those belong to the separate new_york_city dataset.
  min_coverage: 0.95
  date_column: [started_at, starttime, "Start Time"]
  start:
    name: [start_station_name, "start station name", "Start Station Name"]
    id:   [start_station_id, "start station id", "Start Station ID"]
    lat:  [start_lat, "start station latitude", "Start Station Latitude"]
    lng:  [start_lng, "start station longitude", "Start Station Longitude"]
  end:
    name: [end_station_name, "end station name", "End Station Name"]
    id:   [end_station_id, "end station id", "End Station ID"]
    lat:  [end_lat, "end station latitude", "End Station Latitude"]
    lng:  [end_lng, "end station longitude", "End Station Longitude"]
