name: seoul
system_name: seoul_bikeshare
source_url: "https://data.seoul.go.kr/dataList/OA-15182/F/1/datasetView.do#"
aws_sync: false
file_matcher:
  - ".csv"

renamed_columns:
  자전거번호: bike_id
  대여일시: start_time
  대여 대여소번호: start_station_number
  대여 대여소명: start_station_name
  대여거치대: start_dock_number
  반납일시: end_time
  반납대여소번호: end_station_number
  반납대여소명: end_station_name
  반납거치대: end_dock_number
  이용시간: duration_minutes
  이용거리: distance_meters
  이용시간(분): duration_minutes
  이용거리(M): distance_meters
  생년: birth_year
  성별: gender
  이용자종류: user_type
  대여대여소ID: start_station_id
  반납대여소ID: end_station_id
  # 자전거구분: normalized by normalize_bike_type. Korean labels run through 2024-12, then the
  # source re-coded to BIK_00x from 2025-01 (일반자전거→BIK_002 = standard ~77%/20%,
  # 새싹자전거→BIK_003 = the small frame ~1.9%/0.4%). Both are pedal bikes — the axis is frame
  # size, not electric — so 새싹/BIK_003 map to a Seoul-specific `sprout`, not `classic`.
  # Sprout Bike (Saessak Ttareungi, 새싹따릉이) is Seoul's small-sized public rental bicycle. It
  # features a smaller wheel size and lighter weight, making it ideal for teenagers and adults
  # under 160 cm (5'3") tall. Compared to the standard model (24-inch wheels, 18 kg), it has
  # 20-inch wheels and weighs 16 kg, making it much easier and safer to handle.
  자전거구분: bike_type

  대여대여소번호: start_station_id
  대여대여소명: start_station_name

  ## 2017_02
  대여대여소: start_station_name
  반납대여소: end_station_name

  ## 2015
  대여소번: start_station_number
  대여소명: start_station_name
  거치대번호: start_station_dock_number
  반납 거치대번호: end_station_dock_number

date_formats:
# 2017년_3분기_2.csv.gz
- "%Y-%m-%d %H:%M:%S"
# Some 2017 files wrap the timestamp in literal single quotes ('2017-09-16 19:55:07')
- "'%Y-%m-%d %H:%M:%S'"
# Some 2017 files omit seconds, with a non-padded hour (e.g. 2017-01-29 1:39)
- "%Y-%m-%d %H:%M"

read_csv_options:
  null_values:
    - "0000-00-00 00:00:00"   # zero-date sentinel = missing end time -> null

clean_pipeline:
  - encode_utf8
  - clean_seoul_files
  - drop_unbalanced_quote_lines   # a few corrupt rows have a stray quote
  - seoul_prepend_header          # 201812/201904/201905 ship without a header

cleaning_options:
  source_encoding: EUC-KR

# Seoul's raw data is ~40G; stream the clean to gzip-compressed cleaned/*.csv.gz
# instead of writing an uncompressed full duplicate.
compress_cleaned: true

# Seoul has no explicit final_columns by default (DEFAULT_FINAL_COLUMNS = the 4 below); listed
# out here so bike_type is carried through to parquet.
final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - bike_type
  - bike_model

processing_pipeline:
  - clean_header_quotes
  - rename_columns
  - normalize_bike_type
  - select_final_columns
  # bike_type is absent from pre-2023 files; cast to Utf8 so the all-null era doesn't emit a
  # Null-dtype column that clashes with the typed values when parquets are combined.
  - cast_optional_columns
  - convert_to_datetime

