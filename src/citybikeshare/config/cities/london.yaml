name: london
system_name: london_bikeshare
source_url: "https://cycling.data.tfl.gov.uk/"
aws_sync: true
s3_bucket: s3://cycling.data.tfl.gov.uk/usage-stats

file_matcher:
  - ".csv"

renamed_columns:
  # Latest columns
  Start date: start_time
  End date: end_time
  Start station: start_station_name
  End station: end_station_name
  # Legacy Columns 1
  Start Date: start_time
  End Date: end_time
  EndStation Name: end_station_name
  StartStation Name: start_station_name
  # Legacy Columns 2
  End Station Name: end_station_name
  Start Station Name: start_station_name

  Bike Id: bike_id
  Bike model: bike_type


date_formats:
  - "%d/%m/%Y %H:%M"
  - "%Y-%m-%d %H:%M"
  # 2012 era (e.g. "8. Journey Data Extract 22Jul-18Aug12") stamps seconds: 03/08/2012 23:03:21
  - "%d/%m/%Y %H:%M:%S"

final_columns:
  - start_time
  - end_time
  - start_station_name
  - end_station_name
  - bike_id
  - bike_type
  - bike_model

read_csv_options:
  ## Encoding may actually be: windows-1252 (but increases inspect and transform time greatly)
  encoding: "utf8-lossy"
processing_pipeline:
  # Some files like 9a Journey Data Extract 17Aug14-31Aug14.csv, 13b. Journey Data Extract 22Dec14-03Jan15.csv contain rows with no data
  - filter_null_rows
  - rename_columns
  - normalize_bike_type
  - select_final_columns
  - convert_to_datetime 
  - cast_optional_columns


